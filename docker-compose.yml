services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: mysql+pymysql://memory:memory@mysql:3306/memory
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build: .
    command: python -m app.worker
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://memory:memory@mysql:3306/memory
      QDRANT_URL: http://qdrant:6333
      WORKER_POLL_INTERVAL_SECONDS: "2"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: memory
      MYSQL_USER: memory
      MYSQL_PASSWORD: memory
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-umemory", "-pmemory"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  mysql-data:
  qdrant-data:
